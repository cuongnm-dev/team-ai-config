services:
  etc-platform:
    image: ${ETC_PLATFORM_IMAGE:-o0mrblack0o/etc-platform:latest}
    container_name: etc-platform
    ports:
      - "${ETC_PLATFORM_PORT:-8001}:8000"
    environment:
      PYTHONUNBUFFERED: "1"
      LOG_LEVEL: ${ETC_PLATFORM_LOG_LEVEL:-INFO}
    volumes:
      # Bind mount — Docker Desktop handles permissions; Linux: chmod 777 ./data once
      - ./data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/healthz || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

