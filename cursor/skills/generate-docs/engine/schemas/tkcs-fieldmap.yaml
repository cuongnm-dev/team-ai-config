# TKCS field map — mỗi heading match sẽ sinh block content phía dưới.
# Kinds: prose | table | placeholder (default) | none (heading-only, sub có content)
# Match: prefix của heading text (case-insensitive, dấu xử lý bình thường)
#
# Nguyên tắc:
#   - Section 4+5 (technical) dùng Jinja fill từ intel
#   - Section khác (1-3, 6-11) Jinja expr từ tkcs.* — AI writer generate prose từ context
#   - Default fallback: [CẦN BỔ SUNG: <heading>]

field_map:
  # ── SECTION 1: Giới thiệu chung ──
  - { match: "Tên dự án",                    kind: prose, expr: "{{ project.display_name }}" }
  - { match: "Chủ đầu tư",                   kind: prose, expr: "{{ project.client }}" }
  - { match: "Tổ chức tư vấn lập dự án",     kind: prose, expr: "{{ dev_unit }}" }
  - { match: "Hình thức đầu tư",             kind: prose, expr: "{{ tkcs.investment_form or '[CẦN BỔ SUNG: Đầu tư mới / Nâng cấp / Thuê dịch vụ]' }}" }
  - { match: "Thời gian thực hiện dự án",    kind: prose, expr: "{{ tkcs.project_duration or '[CẦN BỔ SUNG: Thời gian dự kiến]' }}" }
  - { match: "Nguồn vốn",                    kind: prose, expr: "{{ tkcs.funding_source or '[CẦN BỔ SUNG: Nguồn vốn]' }}" }

  # ── SECTION 2: Sự cần thiết ──
  - { match: "Cơ sở pháp lý",                kind: prose, expr: "{{ tkcs.legal_basis or '[CẦN BỔ SUNG: Danh mục văn bản pháp lý]' }}" }
  - { match: "Tóm tắt hiện trạng",           kind: prose, expr: "{{ tkcs.current_state or '[CẦN BỔ SUNG: Hiện trạng nghiệp vụ và CNTT]' }}" }
  - { match: "Sự cần thiết đầu tư",          kind: prose, expr: "{{ tkcs.necessity or '[CẦN BỔ SUNG: Lý do phải đầu tư]' }}" }
  - { match: "Xác định mục tiêu",            kind: prose, expr: "{{ tkcs.objectives or '[CẦN BỔ SUNG: Mục tiêu, kết quả, đầu ra]' }}" }
  - { match: "Quy mô đầu tư",                kind: prose, expr: "{{ tkcs.scale or '[CẦN BỔ SUNG: Quy mô dự án]' }}" }
  - { match: "Địa điểm đầu tư",              kind: prose, expr: "{{ tkcs.location or '[CẦN BỔ SUNG: Địa điểm]' }}" }

  # ── SECTION 3: Phù hợp quy hoạch ──
  - { match: "Thuyết minh sự phù hợp với Khung kiến trúc", kind: prose, expr: "{{ tkcs.alignment_cpdt or '[CẦN BỔ SUNG: Đối chiếu Khung KT CPĐT 4.0]' }}" }
  - { match: "Thuyết minh sự phù hợp với Kế hoạch",        kind: prose, expr: "{{ tkcs.alignment_it_plan or '[CẦN BỔ SUNG: Đối chiếu Kế hoạch CNTT]' }}" }
  - { match: "Kết luận",                     kind: prose, expr: "{{ tkcs.alignment_conclusion or '[CẦN BỔ SUNG: Kết luận]' }}" }

  # ── SECTION 4: Phân tích công nghệ ──
  - { match: "Các tiêu chí chung",           kind: prose, expr: "{{ tkcs.tech_criteria_general or '[CẦN BỔ SUNG]' }}" }
  - { match: "Các tiêu chí lựa chọn trang thiết bị", kind: prose, expr: "{{ tkcs.tech_criteria_hardware or '[CẦN BỔ SUNG]' }}" }
  - { match: "Các tiêu chí lựa chọn giải pháp",      kind: prose, expr: "{{ tkcs.tech_criteria_solution or '[CẦN BỔ SUNG]' }}" }
  - { match: "Phương án phân tích giải pháp tổng thể", kind: prose, expr: "{{ tkcs.solution_overview or '[CẦN BỔ SUNG]' }}" }
  - { match: "Phương án dự phòng kết nối",   kind: prose, expr: "{{ tkcs.connectivity_redundancy or '[CẦN BỔ SUNG]' }}" }
  - { match: "Lựa chọn giải pháp, công nghệ phát triển", kind: prose, expr: "{{ tkcs.technology_rationale or '[CẦN BỔ SUNG]' }}" }
  - { match: "Mô hình kiến trúc phần mềm",   kind: prose, expr: "{{ tkcs.software_arch_pattern or '[CẦN BỔ SUNG: Ví dụ microservice, monolith, event-driven]' }}" }
  - { match: "Lựa chọn công nghệ, ngôn ngữ", kind: table,
      headers: ["Lớp", "Công nghệ", "Phiên bản", "Vai trò"],
      loop: "t in architecture.tech_stack",
      columns: ["{{ t.layer }}", "{{ t.technology }}", "{{ t.version or '-' }}", "{{ t.role }}"] }
  - { match: "Lựa chọn về hệ quản trị",      kind: prose, expr: "{{ tkcs.dbms_choice or '[CẦN BỔ SUNG]' }}" }
  - { match: "Lựa chọn hệ điều hành",        kind: prose, expr: "{{ tkcs.os_choice or '[CẦN BỔ SUNG]' }}" }

  # ── SECTION 5: Thiết kế cơ sở ──
  - { match: "Mô tả các yêu cầu của dự án",  kind: prose, expr: "{{ tkcs.project_requirements or architecture.system_overview }}" }
  - { match: "Yêu cầu chung",                kind: prose, expr: "{{ tkcs.req_general or '[CẦN BỔ SUNG]' }}" }
  - { match: "Về an toàn thông tin",         kind: prose, expr: "{{ tkcs.req_security or architecture.security_description }}" }
  - { match: "Về công nghệ kỹ thuật",        kind: prose, expr: "{{ tkcs.req_tech or '[CẦN BỔ SUNG]' }}" }
  - { match: "Danh mục quy chuẩn, tiêu chuẩn", kind: prose, expr: "{{ tkcs.standards or '[CẦN BỔ SUNG: Liệt kê TCVN, ISO áp dụng]' }}" }
  - { match: "Thiết kế mô hình tổng thể",    kind: prose, expr: "{{ architecture.system_overview }}" }
  - { match: "Mô hình kiến trúc tổng thể",   kind: prose, expr: "{{ architecture.logical_description }}" }
  - { match: "Mô hình kiến trúc nghiệp vụ",  kind: prose, expr: "{{ tkcs.business_model or '[CẦN BỔ SUNG]' }}" }
  - { match: "Mô hình kiến trúc dữ liệu",    kind: table,
      headers: ["STT", "Thực thể", "Mục đích", "Loại lưu trữ"],
      loop: "e in architecture.data_entities",
      columns: ["{{ loop.index }}", "{{ e.name }}", "{{ e.purpose }}", "{{ e.storage_type or 'PostgreSQL' }}"] }
  - { match: "Kiến trúc ứng dụng",           kind: table,
      headers: ["STT", "Thành phần", "Loại", "Mô tả"],
      loop: "c in architecture.components",
      columns: ["{{ loop.index }}", "{{ c.name }}", "{{ c.type }}", "{{ c.description }}"] }
  - { match: "Kiến trúc tương tác",          kind: table,
      headers: ["STT", "Endpoint", "Phương thức", "Mô tả", "Xác thực"],
      loop: "a in architecture.apis",
      columns: ["{{ loop.index }}", "{{ a.path }}", "{{ a.method }}", "{{ a.description }}", "{{ a.auth or 'JWT' }}"] }
  - { match: "Thiết kế cơ sở Phần mềm",      kind: prose, expr: "{{ tkcs.software_design or architecture.logical_description }}" }
  - { match: "Thiết kế cơ sở Hạ tầng",       kind: prose, expr: "{{ tkcs.infrastructure_design or architecture.deployment_description }}" }
  - { match: "Khối lượng sơ bộ",             kind: prose, expr: "{{ tkcs.volume_summary or '[CẦN BỔ SUNG: Bóc tách khối lượng theo TT 04/2020/TT-BTTTT]' }}" }

  # ── SECTION 6: ATTT cấp độ ──
  - { match: "Phương án yêu cầu về thiết kế", kind: prose, expr: "{{ tkcs.security_design or architecture.security_description }}" }
  - { match: "Phương án yêu cầu về kỹ thuật", kind: prose, expr: "{{ tkcs.security_tech or '[CẦN BỔ SUNG]' }}" }

  # ── SECTION 7-11: Vận hành, tiến độ, chi phí ──
  - { match: "Chuẩn bị về nguồn lực",        kind: prose, expr: "{{ tkcs.prep_resources or '[CẦN BỔ SUNG]' }}" }
  - { match: "Chuẩn bị về cơ chế, chính sách", kind: prose, expr: "{{ tkcs.prep_policies or '[CẦN BỔ SUNG]' }}" }
  - { match: "Chuẩn bị về hạ tầng truyền thông", kind: prose, expr: "{{ tkcs.prep_network or '[CẦN BỔ SUNG]' }}" }
  - { match: "Chuẩn bị về hạ tầng thiết bị", kind: prose, expr: "{{ tkcs.prep_hardware or '[CẦN BỔ SUNG]' }}" }
  - { match: "Tổ chức hỗ trợ người sử dụng", kind: prose, expr: "{{ tkcs.user_support or '[CẦN BỔ SUNG]' }}" }
  - { match: "Tổ chức quản trị và vận hành", kind: prose, expr: "{{ tkcs.operations or '[CẦN BỔ SUNG]' }}" }
  - { match: "Dự kiến tiến độ thực hiện",    kind: prose, expr: "{{ tkcs.schedule or '[CẦN BỔ SUNG: Gantt/mốc chính]' }}" }
  - { match: "Các mốc chính",                kind: prose, expr: "{{ tkcs.milestones or '[CẦN BỔ SUNG]' }}" }
  - { match: "Tổng mức đầu tư",              kind: prose, expr: "{{ tkcs.total_budget or '[CẦN BỔ SUNG]' }}" }
  - { match: "Tổng mức đầu tư chi tiết",     kind: prose, expr: "{{ tkcs.budget_detail or '[CẦN BỔ SUNG]' }}" }
  - { match: "Bảo hành và hỗ trợ kỹ thuật",  kind: prose, expr: "{{ tkcs.warranty or '[CẦN BỔ SUNG]' }}" }
  - { match: "Xác định sơ bộ về các chi phí vận hành", kind: prose, expr: "{{ tkcs.opex or '[CẦN BỔ SUNG]' }}" }
  - { match: "Chủ đầu tư",                   kind: prose, expr: "{{ project.client }}" }
  - { match: "Kiến nghị áp dụng hình thức",  kind: prose, expr: "{{ tkcs.pm_form or '[CẦN BỔ SUNG: BQL chuyên trách / kiêm nhiệm]' }}" }
  - { match: "Mối quan hệ và trách nhiệm",   kind: prose, expr: "{{ tkcs.stakeholders or '[CẦN BỔ SUNG]' }}" }
  - { match: "Phương pháp quản lý dự án",    kind: prose, expr: "{{ tkcs.pm_method or '[CẦN BỔ SUNG]' }}" }
