# Schema for ETC test-case.xlsx template (BM.QT.04.04)
# Analyzed from: C:/Users/James/Downloads/test-case.xlsx
# 5 sheets, 76 formulas, 28 merged ranges per test sheet
#
# Philosophy:
#   - Template is FIXED — do not rebuild, only FILL specific cells
#   - Preserve: all merged ranges, formulas, data validations, conditional formatting
#   - Write: only cells listed in `writes` section of each sheet
#   - Data rows: clear existing content in configured columns only (never touch protected cols)

template: test-case.xlsx
template_version: "BM.QT.04.04-v1"
analyzed_at: "2026-04-18"

# Sheets that must exist (abort if missing)
required_sheets:
  - Cover
  - Overview
  - Test Result
  - Tên chức năng
  - Tên API

# ─── PRIORITY MAP (Vietnamese writer output → English Excel value) ───
priority_map:
  "Rất cao": "Critical"
  "Cao": "Major"
  "Trung bình": "Normal"
  "Thấp": "Minor"
priority_default: "Normal"

# ──────────────────────────────────────────────────────────────────
# SHEET: Cover
# ──────────────────────────────────────────────────────────────────
sheets:
  Cover:
    # Keep as-is (do not touch)
    preserve:
      ranges: [ "A1:H13", "A21:H26", "A27:H50" ]
      reason: "Header, purpose, TOC, definitions, references — template fixtures"

    # Fill change history first entry at row 17
    writes:
      - cell: A17
        source: $.meta.today
      - cell: B17
        source: $.meta.version
        default: "1.0"
      - cell: C17
        value: "Tạo mới"
      - cell: E17
        value: "Toàn bộ tài liệu"
      - cell: G17
        source: $.dev_unit
      - cell: H17
        value: "[CẦN BỔ SUNG: Reviewer]"

    # Clear placeholder row 16 (<dd/mm/yyyy>, <x.y>, etc.)
    clear_cells: [ A16, B16, C16, E16, G16, H16 ]

  # ────────────────────────────────────────────────────────────────
  # SHEET: Overview
  # ────────────────────────────────────────────────────────────────
  Overview:
    preserve:
      ranges: [ "A1:H4", "A11:H14", "A24:H36" ]
      reason: "Title, project-info labels, history headers, definitions block"

    writes:
      - cell: C5
        source: $.project.display_name
      - cell: C6
        source: $.project.code
        default: ""
      - cell: C7
        source: $.meta.version
        default: "1.0"
      - cell: C8
        source: $.project.client
      - cell: C9
        source: $.project.description
        template: "Hệ thống {project.display_name}"
      - cell: C10
        source: $.project.tech_stack
        default: "[CẦN BỔ SUNG: stack list]"
      - cell: A15
        source: $.meta.today
      - cell: B15
        source: $.meta.version
        default: "1.0"
      - cell: C15
        value: "Tạo mới bộ test case"
      - cell: E15
        value: "Toàn bộ tài liệu"
      - cell: G15
        source: $.dev_unit

  # ────────────────────────────────────────────────────────────────
  # SHEET: Test Result
  # ────────────────────────────────────────────────────────────────
  "Test Result":
    # CRITICAL: row 14-15, 18 have cross-sheet formulas — NEVER WRITE
    preserve:
      ranges: [ "A1:J2", "A11:J13", "A16:J16", "A21:J30" ]
      formula_cells:
        [
          C14,
          D14,
          E14,
          F14,
          G14,
          H14,
          I14,
          C15,
          D15,
          E15,
          F15,
          G15,
          H15,
          I15,
          C18,
          D18,
          E18,
          F18,
          G18,
          H18,
          I18,
        ]
      reason: "Row 14-15 formulas reference Tên chức năng!A7:G7 + Tên API!A7:G7"

    writes:
      - cell: C3
        source: $.project.display_name
      - cell: C4
        source: $.project.code
        default: ""
      - cell: C5
        value: "Web + API (localhost Docker)"
      - cell: C6
        source: $.meta.version
        default: "1.0"
      - cell: C7
        value: "Xem bo-test-case.md, thiet-ke-co-so.md"
      - cell: C8
        value: "[CẦN BỔ SUNG: Tên tester]"
      - cell: C9
        source: $.meta.test_period
        template: "{meta.today} - {meta.today}"
      # B14 / B15 stay as template labels ("Tên chức năng" / "Tên hàm")
      # but we also allow override if project has custom wording
      - cell: B14
        source: $.test_sheets.ui_label
        default: "Chức năng hệ thống"
      - cell: B15
        source: $.test_sheets.api_label
        default: "API hệ thống"

  # ────────────────────────────────────────────────────────────────
  # SHEET: Tên chức năng (UI test cases)
  # ────────────────────────────────────────────────────────────────
  "Tên chức năng":
    preserve:
      ranges: [ "A1:M10" ] # header metadata + column headers rows 1-10
      formula_cells:
        [
          A7,
          B7,
          C7,
          D7,
          E7,
          F7,
          G7,
          I6,
          J6,
          K6,
          L6,
          M6,
          I7,
          J7,
          K7,
          L7,
          M7,
        ]
      reason: "Rows 1-10 = headers, row 6-7 = summary COUNTIF formulas"
      # G = bug ID, I/J/K/L = test results — cleared (tester fills during execution)

    writes:
      - cell: B1
        source: $.project.display_name
      - cell: B2
        source: $.test_sheets.ui_requirement
        default: "Kiểm tra các chức năng hệ thống"
      - cell: B3
        value: "[CẦN BỔ SUNG: Tester]"
      - cell: B4
        source: $.meta.today

    # Data rows write-strategy for UI test cases
    data_table:
      start_row: 11
      end_row_hard_cap: 600 # formulas reference up to row 537
      clear_columns: [ A, B, C, D, E, F, G, H, I, J, K, L, M ]
      source: $.test_cases.ui
      format:
        reference_row: 15 # copy cell styles (font/border/fill) from this row
        auto_id:
          enabled: true
          count_anchor: "$D$11" # =COUNTA($D$11:D{row})
        data_row_height: 33
        group_styles:
          feature_group:
            fill_color: "FF8EA9DB"
            vertical: center
            wrap_text: false
            row_height: 25
          section_header:
            fill_color: "FFD9E1F2"
            vertical: top
            wrap_text: true
            row_height: 40
      row_template:
        B: { source: $.name }
        C: { source: $.steps, transform: "numbered_join" }
        D:
          {
            source: $.expected,
            transform: "numbered_join",
            fallback_source: $.steps,
            fallback_key: "expected",
          }
        E: { source: $.checklog, default: "" }
        F: { source: $.redirect, default: "" }
        H: { source: $.priority, transform: "priority_map" }
        M: { source: $.notes, default: "" }

  # ────────────────────────────────────────────────────────────────
  # SHEET: Tên API
  # ────────────────────────────────────────────────────────────────
  "Tên API":
    preserve:
      ranges: [ "A1:M13" ]
      formula_cells:
        [
          A7,
          B7,
          C7,
          D7,
          E7,
          F7,
          G7,
          I6,
          J6,
          K6,
          L6,
          M6,
          I7,
          J7,
          K7,
          L7,
          M7,
        ]
      reason: "Same as UI sheet. Rows 11-13 are API-specific headers (DATA
        REQUEST/RESPONSE)"
      # G = bug ID, I/J/K/L = test results — cleared (tester fills during execution)

    writes:
      - cell: B1
        source: $.project.display_name
        template: "{project.display_name} — API"
      - cell: B2
        source: $.test_sheets.api_requirement
        default: "Kiểm tra các API hệ thống"
      - cell: B3
        value: "[CẦN BỔ SUNG: Tester]"
      - cell: B4
        source: $.meta.today

    data_table:
      start_row: 14 # API data starts at row 14, not 11
      end_row_hard_cap: 600
      clear_columns: [ A, B, C, D, E, F, G, H, I, J, K, L, M ]
      source: $.test_cases.api
      format:
        reference_row: 14 # copy cell styles (font/border/fill) from this row
        auto_id:
          enabled: true
          count_anchor: "$D$13" # =COUNTA($D$13:D{row})
        data_row_height: 33
        group_styles:
          feature_group:
            fill_color: "FF8EA9DB"
            vertical: center
            wrap_text: false
            row_height: 25
          section_header:
            fill_color: "FFD9E1F2"
            vertical: top
            wrap_text: true
            row_height: 40
      row_template:
        B: { source: $.name }
        C: { source: $.steps, transform: "numbered_join" }
        D:
          {
            source: $.expected,
            transform: "numbered_join",
            fallback_source: $.steps,
            fallback_key: "expected",
          }
        E: { source: $.checklog, default: "" }
        F: { source: $.redirect, default: "" }
        H: { source: $.priority, transform: "priority_map" }
        M: { source: $.notes, default: "" }

# ──────────────────────────────────────────────────────────────────
# VALIDATION RULES (run after fill)
# ──────────────────────────────────────────────────────────────────
validators:
  - name: "All required sheets present"
    type: sheet_names_match
    expected: [ Cover, Overview, Test Result, Tên chức năng, Tên API ]

  - name: "Formula cells preserved as formulas"
    type: formula_cells_intact
    sheet: "Test Result"
    cells: [ C14, D14, E14, F14, G14, H14, I14, C15, D15, C18 ]

  - name: "Priority column values in allowed set"
    type: cell_values_in_set
    sheet: "Tên chức năng"
    column: H
    start_row: 11
    end_row: 600
    allowed: [ "", "Critical", "Major", "Normal", "Minor", null ]

  - name: "No residual template placeholders in Cover rev history"
    type: cells_not_equal
    sheet: Cover
    checks:
      - { cell: A17, must_not_equal: "<dd/mm/yyyy>" }
      - { cell: B17, must_not_equal: "<x.y>" }

  - name: "UI test case count >= minimum"
    type: row_count_min
    sheet: "Tên chức năng"
    column: B
    start_row: 11
    min_count: 1
